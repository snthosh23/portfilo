<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal | Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: radial-gradient(circle at 50% 50%, var(--bg-secondary) 0%, var(--bg-primary) 100%);">

  <div class="login-section">
    <div class="glass-card login-card">
      <div class="login-header">
        <i class="fas fa-user-shield"></i>
        <h1>Admin Portal</h1>
        <p style="color: var(--text-secondary); margin-top: 8px;">Please authenticate to access the dashboard</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="admin@portfolio.com" required>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      
      <div style="text-align: center; margin-top: 24px;">
        <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 14px;">
          <i class="fas fa-arrow-left"></i> Back to Portfolio
        </a>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    // Toast notification helper
    function showToast(message, type = 'success') {
      const toastContainer = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast-notification toast-${type}`;
      toast.innerHTML = message;
      toastContainer.appendChild(toast);

      // Force reflow
      toast.offsetHeight;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 3500);
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value.trim();

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          showToast('Login successful! Redirecting...', 'success');
          // Save JWT in LocalStorage (cookie is also saved by browser automatically)
          localStorage.setItem('token', data.token);
          
          setTimeout(() => {
            window.location.href = '/admin/dashboard';
          }, 1000);
        } else {
          showToast(data.message || 'Authentication failed. Please check your credentials.', 'error');
        }
      } catch (err) {
        console.error('Login error:', err);
        showToast('Server error. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
